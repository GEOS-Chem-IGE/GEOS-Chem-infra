#===============================================================================
# Micromamba environment specification for GCClassic with GNU 14.1.0 compilers
#
# To create the environment:
#   micromamba create --file gcclassic-gnu14.yml
#
# NOTE: This file does not pin package builds or dependencies. To **exactly**
# reproduce the environment, use the gcclassic-gnu14.lock file:
#   micromamba create --name gcclassic-gnu14 --file gcclassic-gnu14.lock
#===============================================================================

name: gcclassic-gnu14
channels:
- conda-forge
dependencies:
- awscli=2.25.8
- cmake=3.30.3
- gcc=14.1.0
- gfortran=14.1.0
- git=2.46.2
- gxx=14.1.0  # g++
- libnetcdf=4.9.2  # netcdf-c
- make=4.4.1
- netcdf-fortran=4.6.1
- pyyaml=6.0.2  # for download_data.py
- tree=2.1.3  # to display contents of ExtData
